<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정부과제 비용 통합 관리</title>
    <meta name="description" content="정부과제 예산 및 비용을 비목별로 통합 관리하는 웹 프로그램">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
    <div id="app" class="app">
        <!-- ═══ Sidebar ═══ -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar__logo">
                <div class="sidebar__logo-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="3" width="20" height="18" rx="2"/><path d="M2 8h20"/><path d="M9 3v5"/><path d="M15 3v5"/><path d="M7 14h2"/><path d="M11 14h2"/><path d="M15 14h2"/>
                    </svg>
                </div>
                <div>
                    <h1 class="sidebar__title">ZETAELEC</h1>
                    <p class="sidebar__subtitle">과제비용관리 v1.1</p>
                </div>
            </div>

            <nav class="sidebar__nav">
                <button class="sidebar__nav-item active" data-tab="dashboard" id="nav-dashboard">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
                    </svg>
                    <span>대시보드</span>
                </button>
                <button class="sidebar__nav-item" data-tab="integrated" id="nav-integrated">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                    <span>통합 대시보드</span>
                </button>
                <button class="sidebar__nav-item" data-tab="expenses" id="nav-expenses">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8"/><path d="M8 17h8"/><path d="M8 9h2"/>
                    </svg>
                    <span>지출내역</span>
                </button>
            </nav>

            <div class="sidebar__divider"></div>

            <div style="padding:8px 12px;display:flex;flex-direction:column;gap:6px">
                <button id="btn-rcms-upload" class="sidebar__rcms-btn" title="RCMS 엑셀 파일 업로드">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <span>RCMS 엑셀 업로드</span>
                </button>
                <button id="btn-image-budget" class="sidebar__rcms-btn" title="예산 이미지 업로드" style="background:linear-gradient(135deg, #3b82f6, #2563eb);color:white;border-color:#2563eb">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <span>예산 이미지 업로드</span>
                </button>
            </div>

            <div class="sidebar__divider"></div>

            <div class="sidebar__actions">
                <button id="btn-export-dashboard" class="sidebar__action-btn" title="예산요약 내보내기">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    <span>예산 내보내기</span>
                </button>
                <button id="btn-export-expenses" class="sidebar__action-btn" title="지출내역 내보내기">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    <span>지출 내보내기</span>
                </button>
                <button id="btn-import" class="sidebar__action-btn" title="CSV 가져오기">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <span>CSV 가져오기</span>
                </button>
                <button id="btn-backup" class="sidebar__action-btn" title="데이터 백업">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
                    </svg>
                    <span>데이터 백업</span>
                </button>
                <button id="btn-restore" class="sidebar__action-btn" title="데이터 복원">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                    </svg>
                    <span>데이터 복원</span>
                </button>
            </div>

            <div class="sidebar__lock-wrap">
                <button id="btn-toggle-lock" class="sidebar__lock-btn" title="설정 잠금/해제"></button>
            </div>

            <div class="sidebar__footer">
                <p class="sidebar__version">ZETAELEC 과제비용관리 v1.1</p>
            </div>
        </aside>

        <!-- ═══ Main Content ═══ -->
        <main class="main">
            <!-- Header -->
            <header class="header">
                <div class="header__left">
                    <div class="header__project-row">
                        <div class="header__project-selector">
                            <label class="header__label">과제 선택</label>
                            <select id="project-select" class="header__select"></select>
                        </div>
                        <div class="header__project-actions">
                            <button id="btn-add-project" class="btn btn--primary btn--sm" title="새 과제 추가">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                과제 추가
                            </button>
                            <button id="btn-edit-project" class="btn btn--ghost btn--sm" title="과제 편집">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                </svg>
                                편집
                            </button>
                            <button id="btn-delete-project" class="btn btn--danger-ghost btn--sm" title="과제 삭제">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                </svg>
                                삭제
                            </button>
                        </div>
                    </div>
                </div>
                <div class="header__year-tabs" id="year-tabs">
                    <!-- Year tabs rendered by JS -->
                </div>
            </header>

            <!-- Content Area -->
            <section class="content" id="content">
                <!-- Dashboard or Expenses rendered here by JS -->
            </section>
        </main>
    </div>

    <!-- ═══ Modal Overlay ═══ -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal-container">
            <!-- Modal content rendered by JS -->
        </div>
    </div>

    <!-- ═══ Toast Notifications ═══ -->
    <div class="toast-container" id="toast-container"></div>

    <!-- ═══ Scripts ═══ -->
    <script src="js/store.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/integrated.js"></script>
    <script src="js/expenses.js"></script>
    <script src="js/projects.js"></script>
    <script src="js/export.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
