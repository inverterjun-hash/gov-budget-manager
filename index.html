<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정부과제 비용 통합 관리</title>
    <meta name="description" content="정부과제 예산 및 비용을 비목별로 통합 관리하는 웹 프로그램">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css?v=4">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer onload="window.onGoogleScriptLoad && window.onGoogleScriptLoad()"></script>
</head>
<body>
    <div id="app" class="app">
        <!-- ═══ Sidebar ═══ -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar__logo">
                <div class="sidebar__logo-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="3" width="20" height="18" rx="2"/><path d="M2 8h20"/><path d="M9 3v5"/><path d="M15 3v5"/><path d="M7 14h2"/><path d="M11 14h2"/><path d="M15 14h2"/>
                    </svg>
                </div>
                <div>
                    <h1 class="sidebar__title">ZETAELEC</h1>
                    <p class="sidebar__subtitle">과제비용관리 v1.1</p>
                </div>
            </div>

            <nav class="sidebar__nav">
                <button class="sidebar__nav-item active" data-tab="dashboard" id="nav-dashboard">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
                    </svg>
                    <span>대시보드</span>
                </button>
                <button class="sidebar__nav-item" data-tab="integrated" id="nav-integrated">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                    <span>통합 대시보드</span>
                </button>
                <button class="sidebar__nav-item" data-tab="expenses" id="nav-expenses">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8"/><path d="M8 17h8"/><path d="M8 9h2"/>
                    </svg>
                    <span>지출내역</span>
                </button>
            </nav>

            <div class="sidebar__divider"></div>

            <div style="padding:8px 12px;display:flex;flex-direction:column;gap:6px">
                <button id="btn-rcms-upload" class="sidebar__rcms-btn" title="RCMS 엑셀 파일 업로드">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <span>RCMS 엑셀 업로드</span>
                </button>
                <button id="btn-image-budget" class="sidebar__rcms-btn" title="예산 이미지 업로드" style="background:linear-gradient(135deg, #3b82f6, #2563eb);color:white;border-color:#2563eb">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <span>예산 이미지 업로드</span>
                </button>
            </div>

            <div class="sidebar__divider"></div>

            <div class="sidebar__actions">
                <button id="btn-export-dashboard" class="sidebar__action-btn" title="예산요약 내보내기">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    <span>예산 내보내기</span>
                </button>
                <button id="btn-export-expenses" class="sidebar__action-btn" title="지출내역 내보내기">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    <span>지출 내보내기</span>
                </button>
                <button id="btn-import" class="sidebar__action-btn" title="CSV 가져오기">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <span>CSV 가져오기</span>
                </button>
                <button id="btn-backup" class="sidebar__action-btn" title="데이터 백업">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
                    </svg>
                    <span>데이터 백업</span>
                </button>
                <button id="btn-restore" class="sidebar__action-btn" title="데이터 복원">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                    </svg>
                    <span>데이터 복원</span>
                </button>
            </div>

            <div class="sidebar__divider"></div>
            
            <div class="sidebar__gdrive-wrap" id="gdrive-container">
                <div class="sidebar__gdrive-header">
                    <span>구글 드라이브 동기화</span>
                    <button id="btn-gdrive-config" class="sidebar__gdrive-config-btn" title="구글 연동 설정">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                        </svg>
                    </button>
                </div>
                <div class="sidebar__gdrive-body">
                    <div id="gdrive-status-text" class="gdrive-status text-muted">로그인 대기 중</div>

                    <!-- 클라이언트 ID 미설정 상태 - 완전 숨김 (DEFAULT_CLIENT_ID 항상 사용) -->
                    <div id="gdrive-noid-state" class="gdrive-state" style="display:none !important;"></div>

                    <!-- 로그인 안 됨 상태 - 기본 표시 -->
                    <div id="gdrive-loggedout-state" class="gdrive-state">
                        <button id="btn-gdrive-login" class="btn btn--gdrive btn--sm btn--block">
                            <svg class="gdrive-logo-svg" viewBox="0 0 24 24" width="14" height="14" style="margin-right:6px">
                                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22c-.87-2.6-2.87-4.53-5.84-4.53z"/>
                                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
                            </svg>
                            <span>Google 로그인</span>
                        </button>
                    </div>

                    <!-- 로그인 성공 상태 -->
                    <div id="gdrive-loggedin-state" class="gdrive-state" style="display: none;">
                        <div class="gdrive-user-info" id="gdrive-user-email">user@gmail.com</div>
                        <div class="gdrive-btn-group" style="display:flex;gap:6px;margin-top:6px">
                            <button id="btn-gdrive-sync" class="btn btn--primary btn--sm" style="flex:1;font-size:0.78rem;">동기화</button>
                            <button id="btn-gdrive-logout" class="btn btn--danger-ghost btn--sm" style="font-size:0.78rem;padding:4px 8px;">로그아웃</button>
                        </div>

                        <!-- 공유 파일 ID 설정 영역 -->
                        <div style="margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.1);">
                            <div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:4px;">파일 ID (부리선 클릭 → 복사)</div>
                            <div id="gdrive-current-file-id" style="font-size:0.65rem;font-family:monospace;word-break:break-all;background:rgba(0,0,0,0.2);padding:4px 6px;border-radius:4px;cursor:pointer;color:#aaa;" title="클릭하면 복사됩니다">동기화 후 표시</div>
                            <div style="margin-top:6px;font-size:0.7rem;color:var(--text-muted);margin-bottom:3px;">혼지 파일 ID 입력 (관리자로부터 받은 ID)</div>
                            <div style="display:flex;gap:4px;">
                                <input id="input-shared-file-id" type="text" placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs..." style="flex:1;font-size:0.68rem;padding:4px 6px;border-radius:4px;border:1px solid rgba(255,255,255,0.15);background:rgba(0,0,0,0.2);color:#fff;min-width:0;">
                                <button id="btn-set-shared-file-id" class="btn btn--primary btn--sm" style="font-size:0.7rem;padding:4px 6px;white-space:nowrap;">설정</button>
                            </div>
                            <div id="gdrive-shared-status" style="font-size:0.68rem;margin-top:3px;color:#4ade80;"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="sidebar__lock-wrap">
                <button id="btn-toggle-lock" class="sidebar__lock-btn" title="설정 잠금/해제"></button>
            </div>

            <div class="sidebar__footer">
                <p class="sidebar__version">ZETAELEC 과제비용관리 v1.1</p>
            </div>
        </aside>

        <!-- ═══ Main Content ═══ -->
        <main class="main">
            <!-- Warning Banner for Sync Conflict -->
            <div id="sync-warning-banner" class="sync-warning-banner" style="display: none;">
                <span style="display:flex;align-items:center;gap:6px">
                    <span>⚠️</span>
                    <span>다른 사용자(<strong id="sync-warning-email">email@gmail.com</strong>)가 구글 드라이브 예산 파일을 업데이트했습니다. 최신 데이터를 반영하려면 동기화해 주세요.</span>
                </span>
                <button id="btn-sync-banner-trigger" class="btn btn--primary btn--sm" style="margin-left:14px;padding:4px 10px;font-size:0.78rem;">지금 동기화</button>
            </div>

            <!-- Header -->
            <header class="header">
                <div class="header__left">
                    <div class="header__project-row">
                        <div class="header__project-selector">
                            <label class="header__label">과제 선택</label>
                            <select id="project-select" class="header__select"></select>
                        </div>
                        <div class="header__project-actions">
                            <button id="btn-add-project" class="btn btn--primary btn--sm" title="새 과제 추가">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                과제 추가
                            </button>
                            <button id="btn-edit-project" class="btn btn--ghost btn--sm" title="과제 편집">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                </svg>
                                편집
                            </button>
                            <button id="btn-delete-project" class="btn btn--danger-ghost btn--sm" title="과제 삭제">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                </svg>
                                삭제
                            </button>
                        </div>
                    </div>
                </div>
                <div class="header__year-tabs" id="year-tabs">
                    <!-- Year tabs rendered by JS -->
                </div>
            </header>

            <!-- Content Area -->
            <section class="content" id="content">
                <!-- Dashboard or Expenses rendered here by JS -->
            </section>
        </main>
    </div>

    <!-- ═══ Modal Overlay ═══ -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal-container">
            <!-- Modal content rendered by JS -->
        </div>
    </div>

    <!-- ═══ Toast Notifications ═══ -->
    <div class="toast-container" id="toast-container"></div>

    <!-- ═══ 모바일 GDrive FAB 버튼 (모바일에서만 보임) ═══ -->
    <button class="mobile-gdrive-fab" id="btn-mobile-gdrive-fab" style="display:none;" title="구글 드라이브 동기화">
        ☁️
    </button>

    <!-- ═══ 모바일 GDrive 패널 ═══ -->
    <div id="mobile-gdrive-panel" style="display:none; position:fixed; bottom:70px; right:0; left:0; background:#0f172a; border-radius:16px 16px 0 0; padding:20px; z-index:300; box-shadow:0 -4px 20px rgba(0,0,0,0.4);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
            <span style="color:#fff;font-weight:600;font-size:0.95rem;">☁️ 구글 드라이브 동기화</span>
            <button id="btn-mobile-gdrive-close" style="background:none;border:none;color:#94a3b8;font-size:1.2rem;cursor:pointer;">✕</button>
        </div>
        <div id="mobile-gdrive-status" style="font-size:0.8rem;color:#94a3b8;margin-bottom:10px;">로그인 대기 중</div>
        <div id="mobile-gdrive-loggedout" style="">
            <button id="btn-mobile-gdrive-login" class="btn btn--gdrive btn--block" style="width:100%;">
                <svg viewBox="0 0 24 24" width="16" height="16" style="margin-right:8px">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
                </svg>
                Google 로그인
            </button>
        </div>
        <div id="mobile-gdrive-loggedin" style="display:none;">
            <div id="mobile-gdrive-email" style="color:#e2e8f0;font-size:0.82rem;margin-bottom:8px;text-align:center;"></div>
            <div style="display:flex;gap:8px;">
                <button id="btn-mobile-gdrive-sync" class="btn btn--primary" style="flex:1;">동기화</button>
                <button id="btn-mobile-gdrive-logout" class="btn btn--danger-ghost">로그아웃</button>
            </div>
        </div>
    </div>

    <!-- ═══ Scripts ═══ -->
    <script src="js/store.js?v=4"></script>
    <script src="js/dashboard.js?v=4"></script>
    <script src="js/integrated.js?v=4"></script>
    <script src="js/expenses.js?v=3"></script>
    <script src="js/projects.js?v=2"></script>
    <script src="js/export.js?v=2"></script>
    <script src="js/gdrive.js?v=5"></script>
    <script src="js/app.js?v=5"></script>
</body>
</html>
